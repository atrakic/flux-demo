apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  interval: 10m0s # detect drift and undo kubectl edits
  prune: true # remove stale resources from cluster
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure
